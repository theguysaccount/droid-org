<style>
  :root{--bg:#0b0a14;--panel:#141021;--line:#2b2347;--txt:#eae8f2;--dim:#948fa9;--accent:#a855f7}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .gate{width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:42px 36px;text-align:center}

  button{width:100%;margin-top:16px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:10px;color:#fff;padding:17px;font-size:17px;font-weight:800;letter-spacing:.14em;cursor:pointer;transition:.15s;animation:glow 2s ease-in-out infinite}
  button:hover{filter:brightness(1.15);transform:translateY(-1px)}
  button:disabled{opacity:.5;cursor:wait;animation:none}
  @keyframes glow{0%,100%{box-shadow:0 0 16px rgba(168,85,247,.35)}50%{box-shadow:0 0 34px rgba(168,85,247,.7)}}
  .err{color:#ff6b81;font-size:12.5px;margin-top:12px;min-height:16px}
  .lock{font-size:30px;margin-bottom:8px}
</style>

    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='Wrong passphrase.';btn.disabled=false;document.getElementById('pw').select();}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
</body>
